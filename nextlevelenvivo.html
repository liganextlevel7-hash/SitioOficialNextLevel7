<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--verde:#1a5c2a;--verde2:#2d8a45;--rojo:#e03030;--bg:#0f1a13;--bg2:#1a2a1e;--bg3:#243028;--border:#2d4035;--text:#e8f0ea;--text2:#8aab91;--yellow:#f9a825;--red:#ef5350;}
body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;min-height:100vh;}
.app{max-width:700px;margin:0 auto;padding:14px;}
.header{background:linear-gradient(135deg,var(--verde),var(--verde2));border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;}
.header h1{font-size:24px;font-weight:900;letter-spacing:2px;color:#fff;}
.header p{font-size:12px;opacity:.8;margin-top:3px;color:#fff;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--rojo);color:white;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:8px;}
.live-dot{width:7px;height:7px;background:white;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--verde);color:#fff;border-color:var(--verde);}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.section h3{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.partido-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:7px;}
.partido-item:hover{border-color:var(--verde2);}
.plogo{width:32px;height:32px;object-fit:contain;background:#1a2a1e;border-radius:4px;padding:2px;}
.pinfo{flex:1;}
.pinfo strong{font-size:13px;color:var(--text);display:block;}
.pinfo small{font-size:11px;color:var(--text2);}
.pbadge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#1e3a20;color:#5dba6a;}
.scoreboard{display:grid;grid-template-columns:1fr 100px 1fr;gap:10px;align-items:center;margin-bottom:12px;}
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.tlogo-box{width:56px;height:56px;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;background:#1a2a1e;border-radius:8px;padding:4px;}
.tlogo-box img{width:100%;height:100%;object-fit:contain;}
.tname{font-size:13px;font-weight:700;color:var(--text);}
.score-box{background:linear-gradient(180deg,var(--verde),#0f3018);border-radius:14px;padding:12px 6px;text-align:center;border:1px solid var(--verde);}
.score-nums{display:flex;align-items:center;justify-content:center;gap:5px;}
.snum{font-size:44px;font-weight:900;color:#fff;line-height:1;}
.ssep{font-size:22px;color:rgba(255,255,255,.4);}
/* CRONÓMETRO MODIFICADO */
.stime{font-size:55px !important;font-weight:900 !important;color:white;margin-top:4px;font-family:monospace;}
.match-btns{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.mbtn{border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
/* BOTÓN ACTIVO MODIFICADO */
.mbtn.active{background:var(--yellow)!important;color:#000!important;border-color:var(--yellow)!important;transform:scale(1.05);font-weight:900;}
.spill{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.act-col{display:flex;flex-direction:column;gap:8px;}
.act-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--text);padding-bottom:6px;border-bottom:1px solid var(--border);}
.act-logo{width:26px;height:26px;object-fit:contain;background:#1a2a1e;border-radius:4px;padding:2px;}
.act-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.act-row span{font-size:12px;color:var(--text2);}
.bpair{display:flex;gap:4px;}
.btn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.btn:active{transform:scale(.97);}
.btn-goal{background:#1e3a20;border-color:#4caf50;color:#7dd87d;}
.btn-yellow{background:#2a2010;border-color:var(--yellow);color:var(--yellow);}
.btn-red{background:#2a1010;border-color:var(--red);color:var(--red);}
.psel{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:6px 8px;font-size:12px;margin-top:3px;}
.yb {display:inline-block;width:11px;height:15px;background:var(--yellow);border-radius:2px;vertical-align:middle;margin-right:3px;}
.rb {display:inline-block;width:11px;height:15px;background:var(--red);border-radius:2px;vertical-align:middle;margin-right:3px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.stat-mini{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-num{font-size:22px;font-weight:900;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;}
.events-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.ev{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg3);border-radius:8px;font-size:12px;border-left:3px solid var(--border);}
.ev.goal{border-left-color:#4caf50;}
.ev.yellow{border-left-color:var(--yellow);}
.ev.red{border-left-color:var(--red);}
.ev-min{font-size:11px;color:var(--text2);min-width:28px;font-weight:700;}
.ev-txt{color:var(--text);flex:1;}
.ev-team{font-size:11px;color:var(--text2);}
.no-ev{text-align:center;color:var(--text2);font-size:13px;padding:22px;}
.hidden{display:none!important;}
.active-bar{background:var(--bg3);border:1px solid var(--verde);border-radius:10px;padding:10px 14px;text-align:center;font-size:13px;font-weight:700;color:var(--verde2);margin-bottom:12px;}
.save-btn{border:1px solid #1a5c2a;background:#1e3a20;color:#7dd87d;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;margin-right:10px;}
.asist-save-btn{border:1px solid #2d8a45;background:#1a5c2a;color:#fff;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.danger-btn{border:1px solid #5a2020;background:#2a1010;color:#ef9090;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;}
.loading{text-align:center;color:var(--text2);padding:20px;font-size:13px;}
.asistencia-box {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.asistencia-col {background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;max-height:250px;overflow-y:auto;}
.asistencia-title {font-size:11px;color:var(--text2);font-weight:bold;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.check-item {display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;color:var(--text);}
.check-item input {width:16px;height:16px;accent-color:var(--verde2);cursor:pointer;}
/* ANIMACIÓN GOL */
#anim-gol-admin { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:99999; align-items:center; justify-content:center; }
@keyframes pop { 0%{transform:scale(0.8)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
</style>
