<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 - Radio en Vivo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at center, #12351a 0%, #0a1a0d 60%, #050805 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
  }

  a.volver {
    position: fixed;
    top: 18px;
    left: 18px;
    color: #111;
    background: linear-gradient(145deg, #b6ff2e, #f2c200);
    text-decoration: none;
    font-weight: bold;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 0 10px rgba(126, 211, 33, 0.5);
    z-index: 10;
  }
  a.volver:hover { transform: scale(1.05); }

  /* ===== BLOQUE ÚNICO: logo + reproductor + badge ===== */
  /* Para agrandar o achicar TODO junto, cambia solo --scale en el div de abajo. */
  .radio-widget {
    width: 400px;
    max-width: 95vw;
    transform: scale(var(--scale, 1));
    transform-origin: center center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .radio-widget .logo {
    width: 100%;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
    position: relative;
    z-index: 2;
  }

  .radio-widget .player-card {
    background: rgba(10, 10, 10, 0.92);
    border: 2px solid #b6ff2e;
    border-radius: 24px;
    padding: 6px;
    box-shadow: 0 0 20px rgba(126, 211, 33, 0.5);
    margin-top: -60px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .live-badge {
    background: #b00020;
    color: #fff;
    font-weight: bold;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 14px;
    letter-spacing: 1px;
    box-shadow: 0 0 12px rgba(176,0,32,0.6);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(176,0,32,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(176,0,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,0,32,0); }
  }

  /* Capa invisible: el PRIMER toque en cualquier parte de la pantalla (incluso
     encima del reproductor de Zeno) activa el jingle, y luego desaparece sola
     para dejar usar el reproductor con normalidad. */
  #unlock-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: transparent;
    cursor: pointer;
  }
</style>
</head>
<body>

  <!-- Capa invisible que captura el primer toque en cualquier parte (ver script abajo) -->
  <div id="unlock-overlay"></div>

  <a href="index.html" class="volver">← Volver al inicio</a>

  <div class="radio-widget" style="--scale:1;">
    <img src="radio.png" alt="Next Level 7 Radio" class="logo">

    <div class="player-card">
      <iframe
        src="https://listen.zeno.fm/player/next-level-7"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        frameborder="0"
        scrolling="no"
        height="250"
        width="300"
        loading="lazy"
        style="border-radius:20px; display:block; max-width:100%;">
      </iframe>
    </div>

    <div class="live-badge">● EN VIVO</div>
  </div>

  <!-- Cortina/jingle "Next Level 7 Radio": suena junto con la radio cada 10 min.
       Se activa solo, sin que tengas que tocar nada especial: en cuanto des cualquier
       clic normal en esta página (por ejemplo, dentro del reproductor de arriba), queda listo. -->
  <audio id="jingle-nl7" src="jingle-nl7.mp3" preload="auto"></audio>

  <script>
    const JINGLE_CADA_MS = 1 * 60 * 1000; // 👉 EN PRUEBA: cada 1 minuto. Cuando ya te guste el volumen, cambia el 1 por un 10.
    const jingleAudio = document.getElementById('jingle-nl7');
    const unlockOverlay = document.getElementById('unlock-overlay');
    let jingleDesbloqueado = false;

    // Amplificamos el volumen del jingle más allá del 100% normal (Web Audio API),
    // porque no podemos bajarle el volumen a la radio de Zeno (vive en otro sitio,
    // fuera de nuestro control) — así que subimos el jingle para que sí se note.
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const jingleSource = audioCtx.createMediaElementSource(jingleAudio);
    const jingleGain = audioCtx.createGain();
    jingleGain.gain.value = 2.5; // 👉 sube este número (ej. 3, 4) si aún se escucha bajito; bájalo si suena distorsionado
    jingleSource.connect(jingleGain).connect(audioCtx.destination);

    function desbloquearJingle(){
      if(jingleDesbloqueado) return;
      if(audioCtx.state === 'suspended') audioCtx.resume();
      jingleAudio.play().then(()=>{
        jingleDesbloqueado = true;
        jingleAudio.pause();
        jingleAudio.currentTime = 0;
      }).catch(()=>{});
      // Quitamos la capa para que el mismo toque (o el siguiente) ya le llegue
      // normal al reproductor de Zeno que está debajo.
      unlockOverlay.style.display = 'none';
    }
    unlockOverlay.addEventListener('click', desbloquearJingle);
    unlockOverlay.addEventListener('touchstart', desbloquearJingle);

    setInterval(()=>{
      if(!jingleDesbloqueado) return;
      jingleAudio.currentTime = 0;
      jingleAudio.play().catch(()=>{});
    }, JINGLE_CADA_MS);
  </script>

</body>
</html>
