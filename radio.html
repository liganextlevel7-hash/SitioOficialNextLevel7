<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level 7 - Radio en Vivo</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: url('fondoradio.png') center/cover no-repeat fixed;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    text-align: center;
    padding-bottom: 60px;
  }

  .logo {
    max-width: 320px;
    margin-top: 40px;
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.7));
  }

  h1 {
    font-size: 1.6rem;
    text-shadow: 2px 2px 6px #000;
    margin: 10px 0 30px;
  }

  .player-card {
    background: rgba(15, 15, 15, 0.85);
    backdrop-filter: blur(4px);
    border: 2px solid #7ed321;
    border-radius: 50px;
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 0 25px rgba(126, 211, 33, 0.4);
    max-width: 90%;
    width: 420px;
  }

  .play-btn {
    background: linear-gradient(145deg, #b6ff2e, #f2c200);
    border: none;
    width: 42px;
    height: 42px;
    min-width: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(126, 211, 33, 0.7);
    transition: transform 0.15s ease;
  }
  .play-btn:hover { transform: scale(1.08); }
  .play-btn svg { width: 18px; height: 18px; fill: #111; }

  .time {
    color: #f2c200;
    font-size: 0.85rem;
    font-weight: bold;
    min-width: 34px;
    text-align: left;
  }

  .progress-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #7ed321, #f2c200, #ff8c00);
    border-radius: 10px;
    animation: flow 2.5s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes flow {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
  }

  .vol-btn svg { width: 20px; height: 20px; fill: #f2c200; }

  .live-badge {
    background: #b00020;
    color: #fff;
    font-weight: bold;
    font-size: 0.8rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 18px;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(176,0,32,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(176,0,32,0); }
    100% { box-shadow: 0 0 0 0 rgba(176,0,32,0); }
  }

  a.volver {
    margin-top: 30px;
    color: #7ed321;
    text-decoration: none;
    font-weight: bold;
  }
  a.volver:hover { text-decoration: underline; }
</style>
</head>
<body>

  <img src="radio.png" alt="Next Level 7 Radio" class="logo">
  <h1>📻 Radio en Vivo</h1>

  <div class="player-card">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <span class="time" id="timeDisplay">0:00</span>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <button class="vol-btn" id="volBtn" onclick="toggleMute()">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2c0-1.77-.94-3.29-2.5-4.03v8.05c1.56-.74 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
  </div>

  <audio id="radioAudio" preload="none">
    <source src="https://stream.zeno.fm/nayznbjmygytv" type="audio/mpeg">
  </audio>

  <div class="live-badge">● EN VIVO</div>

  <script>
    const audio = document.getElementById('radioAudio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const timeDisplay = document.getElementById('timeDisplay');
    let isPlaying = false;

    function togglePlay() {
      if (!isPlaying) {
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      } else {
        audio.pause();
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }
      isPlaying = !isPlaying;
    }

    function toggleMute() {
      audio.muted = !audio.muted;
    }

    audio.addEventListener('timeupdate', () => {
      const mins = Math.floor(audio.currentTime / 60);
      const secs = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
      timeDisplay.textContent = `${mins}:${secs}`;
    });

    // Autoplay intento (algunos navegadores lo bloquean hasta interacción)
    window.addEventListener('load', () => {
      audio.play().then(() => {
        isPlaying = true;
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
      }).catch(() => { /* el usuario deberá dar play manualmente */ });
    });
  </script>

  <a href="index.html" class="volver">← Volver al inicio</a>

</body>
</html>
