<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veamos el Mundial 2026 ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
    border-bottom: 3px solid #c0392b;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    box-shadow: 0 4px 20px rgba(192,57,43,0.3);
  }

  .header-content {
    text-align: center;
  }

  .header-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c0392b;
    margin-bottom: 0.2rem;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px rgba(192,57,43,0.5);
  }

  .header-title span { color: #c0392b; }

  .header-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  /* EMOJIS decorativos */
  .emoji-deco {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* LIVE BADGE */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #c0392b;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 0.5rem;
    animation: blink 1.5s ease-in-out infinite;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #fff;
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* VIDEO CONTAINER */
  .video-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 0.5rem;
  }

  .video-container {
    flex: 1;
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid rgba(192,57,43,0.3);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    min-height: 300px;
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* FOOTER */
  footer {
    background: #080808;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 0.8rem 2rem;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 0.8rem 1rem; }
    .emoji-deco { display: none; }
    .video-wrapper { padding: 0.5rem; }
    .video-container { min-height: 250px; }
  }

  @media (min-height: 600px) {
    .video-container { min-height: calc(100vh - 180px); }
  }
</style>
</head>
<body>

<header>
  <span class="emoji-deco">🏆</span>
  <div class="header-content">
    <p class="header-tag">EN VIVO</p>
    <h1 class="header-title">Veamos el <span>Mundial</span></h1>
    <p class="header-subtitle">FIFA World Cup 2026 · USA · México · Canadá</p>
    <span class="live-badge"><span class="live-dot"></span> TRANSMISIÓN EN VIVO</span>
  </div>
  <span class="emoji-deco">⚽</span>
</header>

<div class="video-wrapper">
  <div class="video-container">
    <iframe 
      src="https://findleembeds.pages.dev/embed/telemundo-4k" 
      width="100%" 
      height="100%" 
      frameborder="0" 
      scrolling="no" 
      allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
      allowfullscreen>
    </iframe>
  </div>
</div>

<footer>
  ⚽ Mundial 2026 · Disfruta el partido
</footer>

</body>
</html>
