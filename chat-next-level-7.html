<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Dominguera — Puebla</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#166534;--vm:#16a34a;--vl:#dcfce7;--vb:#bbf7d0;
  --a:#b45309;--al:#fef9c3;--ab:#fde68a;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g700:#334155;--g900:#0f172a;
  --w:#fff;--r:12px;--rs:8px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:linear-gradient(135deg,#064e26 0%,#0a6e38 100%);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}

/* ── PANTALLA DE CARGA ── */
#loading-screen{background:var(--w);border-radius:20px;padding:48px 32px;width:100%;max-width:400px;margin-top:40px;text-align:center}
.load-ball{font-size:48px;margin-bottom:16px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.load-title{font-size:20px;font-weight:800;color:var(--g900);margin-bottom:8px}
.load-sub{font-size:13px;color:var(--g400);margin-bottom:24px}
.progress-bar{background:var(--g100);border-radius:10px;height:6px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--v),var(--vm));border-radius:10px;transition:width .4s ease;width:0%}
.load-msg{font-size:12px;color:var(--g400)}

/* ── LOGIN ── */
#login-screen{display:none;background:var(--w);border-radius:20px;padding:0;width:100%;max-width:480px;margin-top:20px;overflow:hidden}
.login-hero{background:linear-gradient(135deg,var(--v),var(--vm));padding:28px 28px 24px;text-align:center}
.login-hero-icon{font-size:40px;margin-bottom:10px}
.login-hero-title{font-size:22px;font-weight:800;color:white;margin-bottom:4px}
.login-hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.login-body{padding:24px 28px 28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:14px;color:var(--g900);outline:none;transition:border .15s}
.field input:focus{border-color:var(--vm)}
.field-hint{font-size:11px;color:var(--g400);margin-top:5px}
.select-team-label{font-size:12px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;max-height:320px;overflow-y:auto}
.team-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--r);background:var(--w);cursor:pointer;transition:all .15s;text-align:left}
.team-btn:hover{border-color:var(--vm);background:var(--vl)}
.team-btn.selected{border-color:var(--v);background:var(--v)}
.team-btn img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--g100);border:1px solid var(--g200)}
.team-btn-info{min-width:0}
.team-btn-name{font-size:13px;font-weight:600;color:var(--g700);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-btn.selected .team-btn-name{color:white}
.team-btn-city{font-size:11px;color:var(--g400)}
.team-btn.selected .team-btn-city{color:rgba(255,255,255,.7)}

/* Preview del capitán */
.captain-preview{display:none;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:14px 16px;margin-bottom:18px;align-items:center;gap:12px}
.captain-preview.show{display:flex}
.cap-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--vb);flex-shrink:0}
.cap-name{font-size:15px;font-weight:700;color:var(--g900)}
.cap-team{font-size:12px;color:var(--g400);margin-top:2px}
.cap-badge{font-size:11px;background:var(--vl);color:var(--v);padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-top:4px}

.btn-enter{width:100%;padding:14px;background:var(--v);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-enter:hover{background:var(--vm)}
.btn-enter:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed}
.login-msg{font-size:12px;color:var(--g400);text-align:center;margin-top:10px;min-height:18px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.spinner.dark{border-color:var(--g200);border-top-color:var(--vm)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── APP ── */
#app-screen{display:none;width:100%;max-width:900px;background:var(--w);border-radius:20px;overflow:hidden;margin-top:20px}
.app-header{background:linear-gradient(135deg,var(--v),var(--vm));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.app-header-left{display:flex;align-items:center;gap:12px;min-width:0}
.header-avatar-wrap{position:relative;flex-shrink:0}
.header-team-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4)}
.header-cap-dot{width:18px;height:18px;border-radius:50%;background:var(--vm);border:2px solid white;position:absolute;bottom:-1px;right:-1px;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700}
.header-info{min-width:0}
.header-capname{font-size:15px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-teamname{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:white;padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-logout:hover{background:rgba(255,255,255,.25)}

.tabs{display:flex;border-bottom:1px solid var(--g200);background:var(--w);overflow-x:auto}
.tab{padding:13px 16px;font-size:13px;font-weight:500;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--v);border-bottom-color:var(--v)}
.tab:hover:not(.active){color:var(--g700)}
.nbadge{background:var(--al);color:var(--a);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:700}

.tab-content{display:none;padding:20px}
.tab-content.active{display:block}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--g50);border-radius:var(--r);padding:14px;text-align:center;border:1px solid var(--g200)}
.stat-num{font-size:28px;font-weight:800;color:var(--g900)}
.stat-label{font-size:11px;color:var(--g400);margin-top:2px}

/* PARTIDOS */
.sec-title{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:4px}
.match-card{border:1px solid var(--g200);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;background:var(--w);transition:box-shadow .15s}
.match-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.match-card.pend{border-left:3px solid #f59e0b}
.match-card.ok{border-left:3px solid var(--vm)}
.logos-vs{display:flex;align-items:center;gap:5px;flex-shrink:0}
.logo-sm{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--g100);border:1px solid var(--g200)}
.vs-lbl{font-size:10px;font-weight:700;color:var(--g400)}
.match-info{flex:1;min-width:0}
.match-teams{font-size:14px;font-weight:600;color:var(--g900)}
.match-meta{font-size:12px;color:var(--g400);margin-top:3px}
.hora-ok{color:var(--v);font-weight:700}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:600;flex-shrink:0}
.bp{background:var(--al);color:var(--a);border:1px solid var(--ab)}
.bo{background:var(--vl);color:var(--v);border:1px solid var(--vb)}
.btn-chat{padding:7px 13px;border:1px solid var(--g200);border-radius:var(--rs);background:var(--w);font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.btn-chat:hover{background:var(--vl);border-color:var(--vb);color:var(--v)}
.btn-chat.new{border-color:var(--ab);color:var(--a);background:var(--al)}
.mdot{background:var(--a);color:white;font-size:10px;padding:1px 5px;border-radius:8px}

/* ── CHAT ── */
#chat-view{display:none;flex-direction:column}
.chat-hdr{padding:14px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:12px;background:var(--w)}
.btn-back{background:none;border:none;color:var(--v);font-size:13px;font-weight:700;cursor:pointer;padding:4px 0;flex-shrink:0}
.chat-logos{display:flex;align-items:center;gap:6px;flex-shrink:0}
.logo-chat{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--g100);border:1px solid var(--g200)}
.chat-hdr-info{flex:1;min-width:0}
.chat-hdr-title{font-size:15px;font-weight:700;color:var(--g900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-hdr-sub{font-size:12px;color:var(--g400);margin-top:1px}

.chat-msgs{overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;min-height:300px;max-height:380px;background:var(--g50)}
.bubble{max-width:75%}
.bubble.mine{align-self:flex-end}
.bubble.theirs{align-self:flex-start}
.bub-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bubble.mine .bub-meta{flex-direction:row-reverse}
.bub-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--g200);flex-shrink:0}
.bub-name{font-size:11px;color:var(--g400);font-weight:600}
.bub-text{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble.mine .bub-text{background:var(--v);color:white;border-bottom-right-radius:3px}
.bubble.theirs .bub-text{background:white;color:var(--g900);border:1px solid var(--g200);border-bottom-left-radius:3px}
.bub-time{font-size:10px;color:var(--g400);margin-top:3px}
.bubble.mine .bub-time{text-align:right}
.sys-msg{text-align:center;font-size:12px;color:var(--g500);padding:6px 14px;background:white;border-radius:20px;border:1px solid var(--g200);align-self:center;font-style:italic;max-width:90%}

.chat-footer{padding:14px 20px;border-top:1px solid var(--g200);background:white}
.propose-section{background:var(--g50);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;border:1px solid var(--g200)}
.propose-title{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.propose-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.propose-row label{font-size:12px;color:var(--g500);white-space:nowrap}
input[type=time]{padding:8px 12px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:13px;color:var(--g900);outline:none;transition:border .15s}
input[type=time]:focus{border-color:var(--vm)}
.btn-prop{padding:8px 14px;background:var(--vl);border:1px solid var(--vb);border-radius:var(--rs);color:var(--v);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-prop:hover{background:var(--v);color:white}
.btn-conf{padding:8px 16px;background:var(--v);border:none;border-radius:var(--rs);color:white;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:none;transition:background .15s}
.btn-conf:hover{background:var(--vm)}
.msg-row{display:flex;gap:8px}
.msg-input{flex:1;padding:10px 14px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:14px;color:var(--g900);outline:none;transition:border .15s}
.msg-input:focus{border-color:var(--vm)}
.btn-send{background:var(--v);color:white;border:none;border-radius:var(--rs);padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-send:hover{background:var(--vm)}

/* TABLA */
.tabla-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--g200)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--g200);text-align:left;white-space:nowrap;background:var(--g50)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--g100);color:var(--g700)}
tbody tr:last-child td{border-bottom:none}
tbody tr.mi-equipo td{background:var(--vl);font-weight:700}
tbody tr:hover:not(.mi-equipo) td{background:var(--g50)}
.team-cell{display:flex;align-items:center;gap:10px}
.team-cell img{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
.pos-num{font-weight:700;color:var(--g400)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--g400)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:14px}

@media(max-width:580px){
  body{padding:0;align-items:flex-start}
  #login-screen,#app-screen{border-radius:0;margin-top:0}
  .team-grid{grid-template-columns:1fr}
  .match-card{flex-wrap:wrap}
  .logos-vs{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- CARGA -->
<div id="loading-screen">
  <div class="load-ball">⚽</div>
  <div class="load-title">Liga Dominguera</div>
  <div class="load-sub">Puebla · Cargando datos del torneo...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="load-msg" id="load-msg">Conectando con Google Sheets...</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-hero">
    <div class="login-hero-icon">⚽</div>
    <div class="login-hero-title">Liga Dominguera</div>
    <div class="login-hero-sub">Puebla · Coordina tus partidos del domingo</div>
  </div>
  <div class="login-body">
    <div class="field">
      <label>Tu nombre (capitán)</label>
      <input type="text" id="cap-name" placeholder="Ej: Carlos López" oninput="updatePreview()" maxlength="40">
      <div class="field-hint">Así aparecerás en el chat con los otros equipos</div>
    </div>

    <div class="select-team-label">Selecciona tu equipo</div>
    <div class="team-grid" id="team-grid"></div>

    <div class="captain-preview" id="cap-preview">
      <img class="cap-avatar" id="cap-avatar-img" src="" alt="">
      <div>
        <div class="cap-name" id="cap-preview-name"></div>
        <div class="cap-team" id="cap-preview-team"></div>
        <span class="cap-badge">Capitán</span>
      </div>
    </div>

    <button class="btn-enter" id="btn-enter" disabled onclick="enterApp()">
      Entrar a la app →
    </button>
    <div class="login-msg" id="login-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-header-left">
      <div class="header-avatar-wrap">
        <img class="header-team-logo" id="header-logo" src="" alt="">
        <div class="header-cap-dot">C</div>
      </div>
      <div class="header-info">
        <div class="header-capname" id="header-capname"></div>
        <div class="header-teamname" id="header-teamname"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">← Salir</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="pendientes" onclick="switchTab('pendientes')">
      ⏳ Mis partidos <span class="nbadge" id="badge-n">0</span>
    </div>
    <div class="tab" data-tab="tabla" onclick="switchTab('tabla')">📊 Tabla</div>
    <div class="tab" data-tab="todos" onclick="switchTab('todos')">📅 Calendario</div>
  </div>

  <div id="tab-pendientes" class="tab-content active"></div>
  <div id="tab-tabla" class="tab-content"></div>
  <div id="tab-todos" class="tab-content"></div>

  <!-- CHAT -->
  <div id="chat-view">
    <div class="chat-hdr">
      <button class="btn-back" onclick="closeChat()">← Volver</button>
      <div class="chat-logos">
        <img class="logo-chat" id="chat-logo-l" src="" alt="">
        <span class="vs-lbl">VS</span>
        <img class="logo-chat" id="chat-logo-v" src="" alt="">
      </div>
      <div class="chat-hdr-info">
        <div class="chat-hdr-title" id="chat-title"></div>
        <div class="chat-hdr-sub" id="chat-sub"></div>
      </div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-footer">
      <div class="propose-section">
        <div class="propose-title">📅 Proponer horario del domingo</div>
        <div class="propose-row">
          <label>Hora:</label>
          <input type="time" id="propose-time" value="09:00">
          <button class="btn-prop" onclick="proposeTime()">Proponer esta hora</button>
          <button class="btn-conf" id="btn-conf" onclick="confirmTime()">✅ Confirmar</button>
        </div>
      </div>
      <div class="msg-row">
        <input type="text" class="msg-input" id="msg-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-send" onclick="sendMsg()">Enviar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
//  CONFIG — TU SHEET
// ════════════════════════════════
const SHEET_ID = '1BhDkqSWYzkahtaG19_uO28no5FQbQkDeomjZoMWBYfE';
const GID_EQUIPOS = '1894947293';
const GID_PARTIDOS = '1362473459';

// ════════════════════════════════
//  ESTADO
// ════════════════════════════════
let S = {
  teams: {},    // id -> {id, nombre, ciudad, logo}
  matches: [],  // partidos pendientes
  capName: '',
  teamId: null,
  chats: {},      // matchId -> [{sender,senderName,senderLogo,text,time,type}]
  proposals: {},  // matchId -> {time, by, byName}
  confirmed: {}   // matchId -> time
};

const STORE = 'liga_pue_v3_' + SHEET_ID;
function save(){try{localStorage.setItem(STORE,JSON.stringify({chats:S.chats,proposals:S.proposals,confirmed:S.confirmed}))}catch(e){}}
function loadStored(){try{const r=localStorage.getItem(STORE);if(r){const d=JSON.parse(r);S.chats=d.chats||{};S.proposals=d.proposals||{};S.confirmed=d.confirmed||{}}}catch(e){}}

// ════════════════════════════════
//  FETCH CSV
// ════════════════════════════════
async function fetchCSV(gid){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error(`Error al leer la hoja (gid=${gid}). Asegúrate de que el Sheet sea público.`);
  return parseCSV(await r.text());
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const sep=lines[0].includes('\t')?'\t':',';
  const headers=csvLine(lines[0],sep).map(h=>h.toLowerCase().trim().replace(/\s+/g,'_'));
  return lines.slice(1).map(l=>{
    const vals=csvLine(l,sep);
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function csvLine(line,sep){
  const res=[];let cur='';let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){q=!q}else if(c===sep&&!q){res.push(cur);cur=''}else{cur+=c}
  }
  res.push(cur);
  return res;
}

// ════════════════════════════════
//  CARGA INICIAL
// ════════════════════════════════
async function init(){
  setProgress(10,'Conectando con Google Sheets...');
  try{
    setProgress(30,'Cargando equipos...');
    const equiposRaw = await fetchCSV(GID_EQUIPOS);
    equiposRaw.forEach(r=>{
      const id=r['id_equipo']||r['id'];
      if(!id||id==='10') return; // ignorar Descansa
      S.teams[id]={
        id,
        nombre: r['nombre']||'Equipo '+id,
        ciudad: r['ciudad']||'',
        logo:   r['url']||r['logo']||''
      };
    });

    setProgress(65,'Cargando partidos...');
    const partidosRaw = await fetchCSV(GID_PARTIDOS);
    S.matches = partidosRaw
      .filter(r=>(r['estado']||'').toLowerCase()==='pendiente')
      .map(r=>({
        id:      r['id_partido']||r['id']||'',
        jornada: r['jornada']||'',
        local:   r['equipo_local']||r['local']||'',
        visita:  r['equipo_visita']||r['visita']||'',
        fecha:   r['fecha']||'',
        hora:    r['hora']||'',
        ll:      r['ll']||'',
        lv:      r['lv']||'',
        vuelta:  r['vuelta']||'1'
      }))
      .filter(m=>m.local&&m.visita&&m.local!=='10'&&m.visita!=='10');

    loadStored();
    setProgress(100,'¡Listo!');

    setTimeout(()=>{
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('login-screen').style.display='block';
      renderTeamGrid();
    },400);

  }catch(e){
    setProgress(100,'');
    document.getElementById('load-msg').innerHTML=`<span style="color:#dc2626">❌ ${e.message}</span>`;
  }
}

function setProgress(pct,msg){
  document.getElementById('progress').style.width=pct+'%';
  if(msg) document.getElementById('load-msg').textContent=msg;
}

// ════════════════════════════════
//  LOGIN UI
// ════════════════════════════════
let selectedTeamId=null;

function renderTeamGrid(){
  const used=new Set();
  S.matches.forEach(m=>{used.add(m.local);used.add(m.visita);});
  const teams=Object.values(S.teams).filter(t=>used.has(t.id)).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const grid=document.getElementById('team-grid');
  grid.innerHTML='';
  teams.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='team-btn';
    btn.innerHTML=`
      <img src="${t.logo}" alt="${t.nombre}" onerror="this.style.opacity='.3'">
      <div class="team-btn-info">
        <div class="team-btn-name">${t.nombre}</div>
        <div class="team-btn-city">${t.ciudad}</div>
      </div>`;
    btn.onclick=()=>selectTeam(t.id,btn);
    grid.appendChild(btn);
  });
}

function selectTeam(id,btn){
  selectedTeamId=id;
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  updatePreview();
}

function updatePreview(){
  const name=document.getElementById('cap-name').value.trim();
  const preview=document.getElementById('cap-preview');
  if(name&&selectedTeamId){
    const t=S.teams[selectedTeamId];
    document.getElementById('cap-avatar-img').src=t.logo;
    document.getElementById('cap-preview-name').textContent=name;
    document.getElementById('cap-preview-team').textContent=t.nombre+' · '+t.ciudad;
    preview.classList.add('show');
    document.getElementById('btn-enter').disabled=false;
  }else{
    preview.classList.remove('show');
    document.getElementById('btn-enter').disabled=true;
  }
}

function enterApp(){
  const name=document.getElementById('cap-name').value.trim();
  if(!name||!selectedTeamId) return;
  S.capName=name;
  S.teamId=selectedTeamId;
  const t=S.teams[selectedTeamId];

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('header-logo').src=t.logo;
  document.getElementById('header-capname').textContent=name;
  document.getElementById('header-teamname').textContent='Capitán · '+t.nombre;

  renderAll();
}

function logout(){
  S.capName=''; S.teamId=null; selectedTeamId=null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='block';
  document.getElementById('cap-name').value='';
  document.getElementById('cap-preview').classList.remove('show');
  document.getElementById('btn-enter').disabled=true;
  document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('selected'));
}

// ════════════════════════════════
//  RENDER TABS
// ════════════════════════════════
function renderAll(){ renderPendientes(); renderTabla(); renderTodos(); }

function tname(id){ return (S.teams[id]||{}).nombre||'Equipo '+id; }
function tlogo(id){ return (S.teams[id]||{}).logo||''; }

function renderPendientes(){
  const tid=S.teamId;
  const mine=S.matches.filter(m=>m.local===tid||m.visita===tid);
  const sinH=mine.filter(m=>!S.confirmed[m.id]);
  const conH=mine.filter(m=>!!S.confirmed[m.id]);
  document.getElementById('badge-n').textContent=sinH.length;

  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-num">${mine.length}</div><div class="stat-label">Partidos pendientes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#b45309">${sinH.length}</div><div class="stat-label">Sin horario</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#166534">${conH.length}</div><div class="stat-label">Confirmados</div></div>
  </div>`;

  if(!mine.length){
    html+='<div class="empty"><div class="empty-icon">🎉</div><div class="empty-txt">¡No tienes partidos pendientes!</div></div>';
    document.getElementById('tab-pendientes').innerHTML=html; return;
  }
  if(sinH.length){
    html+='<div class="sec-title">⏳ Sin horario acordado</div>';
    sinH.forEach(m=>{ html+=cardHTML(m); });
  }
  if(conH.length){
    html+='<div class="sec-title" style="margin-top:20px">✅ Horario confirmado</div>';
    conH.forEach(m=>{ html+=cardHTML(m); });
  }
  document.getElementById('tab-pendientes').innerHTML=html;
}

function cardHTML(m){
  const ll=m.ll||tlogo(m.local);
  const lv=m.lv||tlogo(m.visita);
  const conf=S.confirmed[m.id];
  const prop=S.proposals[m.id];
  const msgs=(S.chats[m.id]||[]).length;
  const vuelta=m.vuelta==='2'?' · <em>Vuelta</em>':'';
  let meta=m.jornada?`Jornada ${m.jornada}${vuelta}`:vuelta||'Sin jornada';
  if(conf) meta+=` · <span class="hora-ok">🕐 ${conf} del domingo</span>`;
  else if(prop) meta+=` · Propuesta: ${prop.time} por ${prop.byName}`;
  const chatCls=msgs>0?'btn-chat new':'btn-chat';
  const chatLbl=msgs>0?`💬 Chat <span class="mdot">${msgs}</span>`:'💬 Coordinar hora';
  return `<div class="match-card ${conf?'ok':'pend'}">
    <div class="logos-vs">
      <img class="logo-sm" src="${ll}" alt="" onerror="this.style.opacity='.2'">
      <span class="vs-lbl">VS</span>
      <img class="logo-sm" src="${lv}" alt="" onerror="this.style.opacity='.2'">
    </div>
    <div class="match-info">
      <div class="match-teams">${tname(m.local)} vs ${tname(m.visita)}</div>
      <div class="match-meta">${meta}</div>
    </div>
    <span class="badge ${conf?'bo':'bp'}">${conf?'✅ '+conf:'Por acordar'}</span>
    <button class="${chatCls}" onclick="openChat('${m.id}')">${chatLbl}</button>
  </div>`;
}

// ════════════════════════════════
//  CHAT
// ════════════════════════════════
let curMatch=null;

function openChat(mid){
  curMatch=mid;
  const m=S.matches.find(x=>x.id===mid);
  if(!m) return;
  document.getElementById('chat-logo-l').src=m.ll||tlogo(m.local);
  document.getElementById('chat-logo-v').src=m.lv||tlogo(m.visita);
  document.getElementById('chat-title').textContent=`${tname(m.local)} vs ${tname(m.visita)}`;
  const v=m.vuelta==='2'?' · Vuelta':'';
  document.getElementById('chat-sub').textContent=`Jornada ${m.jornada||'?'}${v} · Pendiente — domingos`;

  const prop=S.proposals[mid];
  const conf=S.confirmed[mid];
  const confBtn=document.getElementById('btn-conf');
  if(prop&&prop.by!==S.teamId&&!conf){
    confBtn.style.display='inline-block';
    confBtn.textContent=`✅ Confirmar ${prop.time}`;
    document.getElementById('propose-time').value=prop.time;
  }else{confBtn.style.display='none';}

  document.querySelector('.tabs').style.display='none';
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.getElementById('chat-view').style.display='flex';
  document.getElementById('chat-view').style.flexDirection='column';

  drawMsgs();
}

function closeChat(){
  curMatch=null;
  document.getElementById('chat-view').style.display='none';
  document.querySelector('.tabs').style.display='flex';
  switchTab('pendientes');
  renderPendientes();
}

function drawMsgs(){
  const msgs=S.chats[curMatch]||[];
  const conf=S.confirmed[curMatch];
  let html='';
  if(conf) html+=`<div class="sys-msg">✅ Horario acordado: <strong>${conf}</strong> del domingo</div>`;
  if(!msgs.length&&!conf) html=`<div class="empty" style="padding:30px 0"><div class="empty-icon">💬</div><div class="empty-txt">Propón un horario para empezar</div></div>`;
  msgs.forEach(msg=>{
    if(msg.type==='sys'){html+=`<div class="sys-msg">${msg.text}</div>`;return;}
    const mine=msg.sender===S.teamId;
    html+=`<div class="bubble ${mine?'mine':'theirs'}">
      <div class="bub-meta">
        <img class="bub-avatar" src="${msg.senderLogo||''}" alt="" onerror="this.style.opacity='.2'">
        <span class="bub-name">${esc(msg.senderName)}</span>
      </div>
      <div class="bub-text">${esc(msg.text)}</div>
      <div class="bub-time">${msg.time}</div>
    </div>`;
  });
  const c=document.getElementById('chat-msgs');
  c.innerHTML=html;
  setTimeout(()=>c.scrollTop=c.scrollHeight,40);
}

function addMsg(key,msg){
  if(!S.chats[key]) S.chats[key]=[];
  S.chats[key].push(msg);
  save();
  drawMsgs();
}

function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!curMatch) return;
  addMsg(curMatch,{
    sender:S.teamId,senderName:S.capName+' ('+tname(S.teamId)+')',
    senderLogo:tlogo(S.teamId),text,time:now(),type:'msg'
  });
  inp.value='';
}

function proposeTime(){
  const time=document.getElementById('propose-time').value;
  if(!time||!curMatch) return;
  S.proposals[curMatch]={time,by:S.teamId,byName:S.capName+' · '+tname(S.teamId)};
  addMsg(curMatch,{
    sender:S.teamId,senderName:S.capName+' ('+tname(S.teamId)+')',
    senderLogo:tlogo(S.teamId),
    text:`📅 Propongo jugar el domingo a las ${time}. ¿Les queda bien?`,
    time:now(),type:'msg'
  });
  document.getElementById('btn-conf').style.display='none';
  save();
}

function confirmTime(){
  const prop=S.proposals[curMatch];
  if(!prop) return;
  S.confirmed[curMatch]=prop.time;
  addMsg(curMatch,{
    sender:'sys',senderName:'',senderLogo:'',
    text:`✅ ${S.capName} (${tname(S.teamId)}) confirmó el horario: <strong>${prop.time}</strong> del domingo`,
    time:now(),type:'sys'
  });
  document.getElementById('btn-conf').style.display='none';
  save();
}

// ════════════════════════════════
//  TABLA
// ════════════════════════════════
function renderTabla(){
  const sc={};
  Object.values(S.teams).forEach(t=>{ sc[t.id]={...t,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0}; });
  const sorted=Object.values(sc).sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||a.nombre.localeCompare(b.nombre));
  let html=`<div style="font-size:12px;color:var(--g400);margin-bottom:12px;padding:10px 12px;background:var(--g50);border-radius:var(--rs);border:1px solid var(--g200)">
    📊 La tabla de posiciones se actualiza cuando tu Sheet tenga resultados (Goles_Local y Goles_Visita). Por ahora muestra los equipos registrados.
  </div>
  <div class="tabla-wrap"><table>
  <thead><tr><th>#</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
  sorted.forEach((t,i)=>{
    const mine=t.id===S.teamId;
    html+=`<tr class="${mine?'mi-equipo':''}">
      <td class="pos-num">${i+1}</td>
      <td><div class="team-cell"><img src="${t.logo}" onerror="this.style.opacity='.2'">${mine?'⭐ ':''}${t.nombre}</div></td>
      <td>${t.pj}</td><td>${t.g}</td><td>${t.e}</td><td>${t.p}</td>
      <td>${t.gf-t.gc>=0?'+':''}${t.gf-t.gc}</td><td><strong>${t.pts}</strong></td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('tab-tabla').innerHTML=html;
}

// ════════════════════════════════
//  CALENDARIO
// ════════════════════════════════
function renderTodos(){
  const byJ={};
  S.matches.forEach(m=>{
    const key=(m.vuelta==='2'?'🔄 Vuelta':'🔜 Ida')+(m.jornada?' — Jornada '+m.jornada:' — Sin jornada');
    if(!byJ[key]) byJ[key]=[];
    byJ[key].push(m);
  });
  const tid=S.teamId;
  let html='';
  Object.keys(byJ).sort().forEach(j=>{
    html+=`<div class="sec-title">${j}</div>`;
    byJ[j].forEach(m=>{
      const conf=S.confirmed[m.id];
      const mine=m.local===tid||m.visita===tid;
      const ll=m.ll||tlogo(m.local);const lv=m.lv||tlogo(m.visita);
      html+=`<div class="match-card ${conf?'ok':'pend'}" style="${mine?'background:#f0fdf4':''}">
        <div class="logos-vs">
          <img class="logo-sm" src="${ll}" alt="" onerror="this.style.opacity='.2'">
          <span class="vs-lbl">VS</span>
          <img class="logo-sm" src="${lv}" alt="" onerror="this.style.opacity='.2'">
        </div>
        <div class="match-info">
          <div class="match-teams">${tname(m.local)} vs ${tname(m.visita)}</div>
          <div class="match-meta">${conf?`✅ <span class="hora-ok">${conf}</span>`:'⏳ Sin horario'}${mine?' · <strong>Tu partido</strong>':''}</div>
        </div>
        ${mine?`<button class="btn-chat" onclick="openChat('${m.id}')">💬 Chat</button>`:''}
      </div>`;
    });
  });
  if(!html) html='<div class="empty"><div class="empty-icon">📅</div><div class="empty-txt">No hay partidos pendientes cargados</div></div>';
  document.getElementById('tab-todos').innerHTML=html;
}

// ════════════════════════════════
//  UTILS
// ════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>{t.style.display='none';t.classList.remove('active');});
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  const el=document.getElementById('tab-'+tab);
  el.style.display='block';el.classList.add('active');
}
function now(){return new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Arrancar
init();
</script>
</body>
</html>
